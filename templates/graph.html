<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Film Color Graph</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #080808;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    cursor: crosshair;
  }

  #canvas { width: 100vw; height: 100vh; }

  .link {
    stroke-opacity: 0.15;
    stroke-width: 0.5;
  }

  .node image {
    cursor: grab;
    transition: opacity 0.2s, transform 0.2s ease;
    transform-origin: center;
    transform-box: fill-box;
  }

  .node:hover image {
    transform: scale(1.6);
  }

  .node image:hover { cursor: grab; }
  .node image:active { cursor: grabbing; }

  .node.dimmed image { opacity: 0.08; }
  .node.dimmed rect { opacity: 0.08; }
  .link.dimmed { stroke-opacity: 0.03; }
  .node.highlighted image { opacity: 1; }
  .node.highlighted rect { opacity: 1; }
  .link.highlighted { stroke-opacity: 0.7; stroke-width: 1.5; }

  #tooltip {
    position: fixed;
    background: rgba(10,10,10,0.92);
    border: 1px solid rgba(255,255,255,0.12);
    color: #e0e0e0;
    padding: 10px 14px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    max-width: 200px;
    line-height: 1.6;
    letter-spacing: 0.03em;
    z-index: 100;
  }

  #tooltip.visible { opacity: 1; }
  #tooltip .film-title { font-size: 12px; color: #fff; margin-bottom: 4px; letter-spacing: 0.06em; }
  #tooltip .file-name { color: rgba(255,255,255,0.4); font-size: 10px; }

  #controls {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 24px;
    align-items: center;
    z-index: 50;
  }

  .ctrl-label {
    color: rgba(255,255,255,0.3);
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 100px;
    height: 1px;
    background: rgba(255,255,255,0.2);
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.7);
    cursor: pointer;
  }

  #hud {
    position: fixed;
    top: 24px;
    left: 28px;
    color: rgba(255,255,255,0.2);
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    line-height: 2;
    pointer-events: none;
  }

  #hud span { color: rgba(255,255,255,0.5); }
</style>
</head>
<body>

<svg id="canvas"></svg>

<div id="tooltip">
  <div class="film-title" id="tt-film"></div>
  <div class="film-year" id="tt-year"></div>
</div>

<div id="hud">
  nodes &nbsp;<span id="hud-nodes">—</span><br>
  links &nbsp;<span id="hud-links">—</span><br>
  drag to pan &nbsp;·&nbsp; scroll to zoom
</div>

<div id="controls">
  <span class="ctrl-label">charge</span>
  <input type="range" id="charge-slider" min="-300" max="-10" value="-80" step="5">
  <span class="ctrl-label">link dist</span>
  <input type="range" id="dist-slider" min="10" max="120" value="40" step="5">
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script>
const DATA_PATH = "/sessions/{{ session_id }}/force_graph.json";
const IMG_DIR   = "/sessions/{{ session_id }}/cached_images/";
const NODE_W    = 80;
const NODE_H    = 54;

const svg    = d3.select("#canvas");
const W      = window.innerWidth;
const H      = window.innerHeight;
const tooltip = document.getElementById("tooltip");

svg.attr("width", W).attr("height", H);

const g = svg.append("g");

const bgRect = svg.insert("rect", ":first-child")
    .attr("width", W).attr("height", H)
    .attr("fill", "#080808")
    .style("transition", "fill 0.6s ease");

svg.call(
  d3.zoom()
    .scaleExtent([0.1, 8])
    .on("zoom", e => g.attr("transform", e.transform))
);

let simulation, linkSel, nodeSel;

d3.json(DATA_PATH).then(data => {

  document.getElementById("hud-nodes").textContent = data.nodes.length;
  document.getElementById("hud-links").textContent = data.links.length;

  // Derive average LAB color for each node for link coloring
  const labMap = {};
  data.nodes.forEach(n => { labMap[n.id] = n.lab; });

  function labToHex(lab) {
    const l = Math.max(0, Math.min(100, lab[0]));
    const a = lab[1]; const b = lab[2];
    let y = (l + 16) / 116;
    let x = a / 500 + y;
    let z = y - b / 200;
    x = 0.95047 * ((x*x*x > 0.008856) ? x*x*x : (x - 16/116)/7.787);
    y = 1.00000 * ((y*y*y > 0.008856) ? y*y*y : (y - 16/116)/7.787);
    z = 1.08883 * ((z*z*z > 0.008856) ? z*z*z : (z - 16/116)/7.787);
    let r = x*3.2406 + y*-1.5372 + z*-0.4986;
    let gg = x*-0.9689 + y*1.8758 + z*0.0415;
    let bv = x*0.0557 + y*-0.2040 + z*1.0570;
    r = Math.min(1, Math.max(0, r > 0.0031308 ? 1.055*Math.pow(r,1/2.4)-0.055 : 12.92*r));
    gg = Math.min(1, Math.max(0, gg > 0.0031308 ? 1.055*Math.pow(gg,1/2.4)-0.055 : 12.92*gg));
    bv = Math.min(1, Math.max(0, bv > 0.0031308 ? 1.055*Math.pow(bv,1/2.4)-0.055 : 12.92*bv));
    const toH = v => Math.round(v*255).toString(16).padStart(2,"0");
    return `#${toH(r)}${toH(gg)}${toH(bv)}`;
  }

  simulation = d3.forceSimulation(data.nodes)
    .force("link", d3.forceLink(data.links)
      .id(d => d.id)
      .strength(d => d.strength * 0.3)
      .distance(40))
    .force("charge", d3.forceManyBody().strength(-80))
    .force("center", d3.forceCenter(W / 2, H / 2))
    .force("collision", d3.forceCollide(NODE_W * 0.6));

  // Links
  linkSel = g.append("g").attr("class", "links")
    .selectAll("line")
    .data(data.links)
    .join("line")
      .attr("class", "link")
      .attr("stroke", "#ffffff");

  // Nodes
  nodeSel = g.append("g").attr("class", "nodes")
    .selectAll("g")
    .data(data.nodes)
    .join("g")
      .attr("class", "node")
      .call(d3.drag()
        .on("start", dragStarted)
        .on("drag",  dragged)
        .on("end",   dragEnded))
      .on("mouseover", mouseOver)
      .on("mousemove", mouseMove)
      .on("mouseout",  mouseOut);

  nodeSel.append("rect")
    .attr("x", -NODE_W/2).attr("y", -NODE_H/2)
    .attr("width", NODE_W).attr("height", NODE_H)
    .attr("fill", d => labToHex(d.lab))
    .attr("rx", 2);

  nodeSel.append("image")
    .attr("x", -NODE_W/2).attr("y", -NODE_H/2)
    .attr("width", NODE_W).attr("height", NODE_H)
    .attr("preserveAspectRatio", "xMidYMid slice")
    .attr("href", d => IMG_DIR + d.file)
    .attr("clip-path", "inset(0 round 2px)");

  nodeSel.on("dblclick", (event, d) => {
    event.preventDefault();
    if (d.url) window.open(d.url, "_blank");
  });

  simulation.on("tick", () => {
    linkSel
      .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    nodeSel.attr("transform", d => `translate(${d.x},${d.y})`);
  });

  // Slider controls
  document.getElementById("charge-slider").addEventListener("input", function() {
    simulation.force("charge").strength(+this.value);
    simulation.alpha(0.4).restart();
  });

  document.getElementById("dist-slider").addEventListener("input", function() {
    simulation.force("link").distance(+this.value);
    simulation.alpha(0.4).restart();
  });

  // Build adjacency for highlight
  const adjacency = new Map();
  data.links.forEach(l => {
    const sid = typeof l.source === "object" ? l.source.id : l.source;
    const tid = typeof l.target === "object" ? l.target.id : l.target;
    if (!adjacency.has(sid)) adjacency.set(sid, new Set());
    if (!adjacency.has(tid)) adjacency.set(tid, new Set());
    adjacency.get(sid).add(tid);
    adjacency.get(tid).add(sid);
  });

  function mouseOver(event, d) {
    const neighbors = adjacency.get(d.id) || new Set();

    nodeSel.classed("dimmed", n => n.id !== d.id && !neighbors.has(n.id));
    nodeSel.classed("highlighted", n => n.id === d.id || neighbors.has(n.id));

    linkSel.classed("dimmed", l => {
      const s = typeof l.source === "object" ? l.source.id : l.source;
      const t = typeof l.target === "object" ? l.target.id : l.target;
      return s !== d.id && t !== d.id;
    });
    linkSel.classed("highlighted", l => {
      const s = typeof l.source === "object" ? l.source.id : l.source;
      const t = typeof l.target === "object" ? l.target.id : l.target;
      return s === d.id || t === d.id;
    });

    bgRect.attr("fill", labToHex(d.lab));

    document.getElementById("tt-film").textContent = d.film.replace(/_/g, " ");
    document.getElementById("tt-year").textContent = d.year;
    tooltip.classList.add("visible");
  }

  function mouseMove(event) {
    tooltip.style.left = (event.clientX + 16) + "px";
    tooltip.style.top  = (event.clientY - 8)  + "px";
  }

  function mouseOut() {
    bgRect.attr("fill", "#080808");
    nodeSel.classed("dimmed", false).classed("highlighted", false);
    linkSel.classed("dimmed", false).classed("highlighted", false);
    tooltip.classList.remove("visible");
  }

  function dragStarted(event, d) {
    if (!event.active) simulation.alphaTarget(0.3).restart();
    d.fx = d.x; d.fy = d.y;
  }

  function dragged(event, d) {
    d.fx = event.x; d.fy = event.y;
  }

  function dragEnded(event, d) {
    if (!event.active) simulation.alphaTarget(0);
    d.fx = null; d.fy = null;
  }

}).catch(err => {
  document.body.innerHTML = `<div style="color:rgba(255,255,255,0.4);font-family:monospace;padding:40px;font-size:13px;">
    could not load force_graph.json<br><br>${err}</div>`;
});
</script>
</body>
</html>
